name: CI
"on": push
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest pandas
      - run: python -m pytest tests/test_chain_normalizer.py tests/test_nutrition_store.py tests/test_recommender.py -q
